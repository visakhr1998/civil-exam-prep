<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prépa Naturalisation Française</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Flip Animation Classes */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 cursor-pointer" onclick="app.showDashboard()">
                    <span class="text-2xl">🇫🇷</span>
                    <h1 class="font-bold text-lg text-slate-900 tracking-tight">France Prépa</h1>
                </div>
                <button onclick="app.toggleLanguage()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1 rounded-md text-sm font-medium transition-colors">
                    <span id="lang-display">FR</span>
                </button>
            </div>
            <button onclick="app.resetApp()" id="btn-reset" class="text-xs text-slate-400 hover:text-red-500 transition-colors">
                Réinitialiser
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-container" class="flex-grow max-w-3xl mx-auto w-full p-4">
        
        <!-- VIEW: DASHBOARD -->
        <div id="dashboard-view" class="space-y-6">
            <div class="text-center py-6">
                <h2 id="dash-title" class="text-3xl font-bold text-slate-900 mb-2">Prêt pour l'entretien ?</h2>
                <p id="dash-subtitle" class="text-slate-500">Choisissez un thème pour commencer vos révisions.</p>
            </div>

            <div id="categories-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- Categories injected by JS -->
            </div>
        </div>

        <!-- VIEW: MODE SELECTION -->
        <div id="mode-view" class="hidden space-y-6">
            <button onclick="app.showDashboard()" class="text-blue-600 font-medium flex items-center gap-1 mb-4">
                <span id="btn-back">← Retour</span>
            </button>
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-center">
                <h2 id="selected-category-title" class="text-2xl font-bold mb-2">Thème</h2>
                <p id="mode-subtitle" class="text-slate-500 mb-8">Choisissez votre mode d'apprentissage</p>

                <div class="grid gap-4">
                    <button onclick="app.startQuiz('study')" class="group relative p-6 rounded-xl border-2 border-blue-100 hover:border-blue-500 bg-blue-50/50 hover:bg-blue-50 transition-all text-left">
                        <div class="flex justify-between items-center">
                            <div>
                                <h3 id="mode-study-title" class="font-bold text-blue-900">Mode Étude 📖</h3>
                                <p id="mode-study-desc" class="text-sm text-blue-700 mt-1">Flashcards, astuces mémoire, pas de stress.</p>
                            </div>
                            <span class="text-2xl group-hover:scale-110 transition-transform">➜</span>
                        </div>
                    </button>

                    <button onclick="app.startQuiz('exam')" class="group relative p-6 rounded-xl border-2 border-red-100 hover:border-red-500 bg-red-50/50 hover:bg-red-50 transition-all text-left">
                        <div class="flex justify-between items-center">
                            <div>
                                <h3 id="mode-exam-title" class="font-bold text-red-900">Mode Examen ⏱️</h3>
                                <p id="mode-exam-desc" class="text-sm text-red-700 mt-1">30s par question, score final, conditions réelles.</p>
                            </div>
                            <span class="text-2xl group-hover:scale-110 transition-transform">➜</span>
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <!-- VIEW: QUIZ -->
        <div id="quiz-view" class="hidden max-w-xl mx-auto h-full flex flex-col justify-center min-h-[80vh]">
            <!-- Progress & Timer -->
            <div class="flex justify-between items-center mb-6 text-sm font-medium text-slate-400">
                <span id="quiz-progress">Question 1/10</span>
                <div id="timer-badge" class="hidden bg-slate-100 text-slate-600 px-3 py-1 rounded-full flex items-center gap-2">
                    <span>⏱️</span>
                    <span id="timer-display">30s</span>
                </div>
            </div>

            <!-- Flashcard Container -->
            <div class="perspective-1000 w-full relative min-h-[400px]">
                <div id="flashcard-inner" class="relative w-full h-full transition-transform duration-700 transform-style-3d">
                    
                    <!-- FRONT: Question -->
                    <div class="absolute w-full h-full backface-hidden bg-white p-8 rounded-3xl shadow-xl border border-slate-100 flex flex-col justify-between">
                        <div>
                            <span id="question-category-tag" class="inline-block px-3 py-1 rounded-full bg-slate-100 text-slate-500 text-xs font-bold mb-4 uppercase tracking-wider">Catégorie</span>
                            <h3 id="question-text" class="text-xl sm:text-2xl font-bold text-slate-800 leading-tight mb-8">
                                <!-- Question goes here -->
                            </h3>
                            <div id="options-container" class="space-y-3">
                                <!-- Options injected by JS -->
                            </div>
                        </div>
                    </div>

                    <!-- BACK: Answer & Tip (Study Mode Only) -->
                    <div class="absolute w-full h-full backface-hidden rotate-y-180 bg-white p-8 rounded-3xl shadow-xl border border-slate-100 flex flex-col justify-between">
                        <div class="flex flex-col items-center text-center">
                            <div id="feedback-icon" class="text-5xl mb-2">✨</div>
                            <h3 id="feedback-title" class="text-2xl font-bold mb-4">Correct !</h3>
                            
                            <div class="w-full mb-6">
                                <p id="feedback-correct-label" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">La bonne réponse est :</p>
                                <div id="feedback-answer-container" class="p-4 rounded-2xl bg-slate-50 border border-slate-100">
                                    <p id="feedback-correct-answer" class="text-lg font-bold text-slate-800"></p>
                                </div>
                            </div>
                            
                            <div id="tip-container" class="bg-amber-50 border border-amber-100 p-4 rounded-2xl w-full text-left">
                                <p id="label-tip" class="text-[10px] text-amber-600 font-bold uppercase tracking-widest mb-1 flex items-center gap-1">
                                    <span>💡</span> <span id="tip-label-text">Astuce Mémoire</span>
                                </p>
                                <p id="feedback-tip" class="text-sm leading-relaxed text-amber-900">
                                    <!-- Tip goes here -->
                                </p>
                            </div>
                        </div>

                        <button onclick="app.nextQuestion()" id="btn-next" class="mt-6 bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all w-full shadow-lg shadow-slate-200">
                            Question Suivante
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- VIEW: RESULTS -->
        <div id="results-view" class="hidden space-y-6 text-center pt-10">
            <div class="bg-white p-8 rounded-3xl shadow-lg border border-slate-100">
                <div class="text-6xl mb-4">🏆</div>
                <h2 id="res-title" class="text-3xl font-bold text-slate-900 mb-2">Terminé !</h2>
                <p id="res-subtitle" class="text-slate-500 mb-6">Voici votre résultat pour cette session.</p>
                
                <div class="flex justify-center items-end gap-2 mb-8">
                    <span id="score-display" class="text-5xl font-bold text-blue-600">8/10</span>
                    <span id="res-correct-label" class="text-slate-400 text-xl mb-2">correctes</span>
                </div>

                <div id="results-feedback-list" class="text-left space-y-4 mb-8 max-h-60 overflow-y-auto pr-2">
                    <!-- Mistakes list -->
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="app.startQuiz(app.currentMode)" id="btn-retry" class="bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors">
                        Réessayer
                    </button>
                    <button onclick="app.showDashboard()" id="btn-menu" class="bg-slate-100 text-slate-700 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">
                        Menu Principal
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
